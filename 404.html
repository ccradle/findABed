<!DOCTYPE html>

  <style>
    :root {
      --bg: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --accent: #1a56db;
      --card-bg: #f8fafc;
      --border: #e2e8f0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --accent: #60a5fa;
        --card-bg: #1e293b;
        --border: #334155;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.5;
    }
    .container {
      max-width: 480px;
      text-align: center;
    }
    .emoji {
      font-size: 64px;
      margin-bottom: 16px;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    p {
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .tagline {
      font-style: italic;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 32px;
    }
    a {
      display: inline-block;
      padding: 12px 24px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 14px;
      min-height: 44px;
      line-height: 20px;
    }
    a:hover { opacity: 0.9; }
    a:focus { outline: 3px solid var(--accent); outline-offset: 2px; }
